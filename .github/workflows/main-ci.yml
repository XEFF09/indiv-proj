name: "Main CI"
on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      version_type:
        description: "Version bump type (patch, minor, major)"
        required: false
        default: "patch"
permissions:
  contents: write
  id-token: write

jobs:
  generate_tag:
    uses: xeff09/infra-template/.github/workflows/generate-tag.yml@main
    with:
      version_type: ${{ github.event.inputs.version_type || 'patch' }}

  docker_build:
    needs: generate_tag
    uses: xeff09/infra-template/.github/workflows/gofiber-build.yml@main
    with:
      app_name: "indiv-image"
      new_tag: ${{ needs.generate_tag.outputs.new_tag }}
    secrets:
      docker_username: ${{ secrets.DOCKER_USERNAME }}

  docker_push:
    needs: docker_build
    uses: xeff09/infra-template/.github/workflows/docker-push.yml@main
    with:
      app_name: "indiv-image"
      new_tag: ${{ needs.generate_tag.outputs.new_tag }}
    secrets:
      docker_username: ${{ secrets.DOCKER_USERNAME }}
      docker_password: ${{ secrets.DOCKER_PASSWORD }}

  release:
    needs: docker_push
    uses: xeff09/infra-template/.github/workflows/release.yml@main
    with:
      new_tag: ${{ needs.generate_tag.outputs.new_tag }}
